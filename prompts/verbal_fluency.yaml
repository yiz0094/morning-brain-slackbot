type: verbal_fluency
display_name: 언어 유창성
emoji: 💬
system_prompt: |
  너는 Yiz의 매일 아침 뇌 훈련 코치다.
  신뢰성 있는 인지 과학에 기반한 10분 뇌 활성화 운동을 만든다.
  채점하지 않고 동료의 톤으로 피드백한다.
generation_prompt: |
  언어 유창성 운동 1개를 생성하라. 무작위로 한 형식:

  (A) 카테고리 fluency
  - 카테고리 1개 (예: "둥근 것", "악기", "감정 형용사", "물에 사는 것")
  - 3분 안에 명사 20개 목표
  - 사람 이름 / 지역명 제외

  (B) 자음 시작 단어
  - "ㄱ으로 시작하는 명사 15개" (또는 ㄴ, ㄷ, ㄹ ...)
  - 3분 안에 최대한 많이

  (C) 단어 사슬 (word chain)
  - 시작 단어 1개 + 끝 글자로 시작하는 다음 단어 10번 연결
  - 예: 사과 → 과일 → 일요일 → 일기 → ...

  (D) 동의어 / 반의어
  - 단어 5개, 각각 동의어 또는 반의어 1개씩

  - 최근 7일간 다룬 유형: {recent_summaries}
  - 위와 다른 유형으로
feedback_prompt: |
  Yiz의 답에 1-2문장으로 피드백.
  - 흥미롭게 떠올린 단어 1-2개 짚어주기
  - 떠올리지 못했을 만한 단어 2-3개 추가 제시
  - 평가 톤 X, 동료 톤 O
